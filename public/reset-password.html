<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLAVORY. — Nuova password</title>
  <link rel="icon" type="image/png" href="/flavory-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      background: #fff2f2;
      cursor: none;
    }
    .custom-cursor {
      width: 20px; height: 20px;
      background: #b22222; border-radius: 50%;
      position: fixed; pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999; transition: width 0.2s, height 0.2s;
    }
    .custom-cursor.hover { width: 34px; height: 34px; }

    .auth-left {
      flex: 1; background: #0e0303;
      display: flex; flex-direction: column;
      justify-content: center; padding: 60px;
      position: relative; overflow: hidden;
    }
    .auth-left::before {
      content: ''; position: absolute;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(178,34,34,0.15) 0%, transparent 70%);
      top: -100px; right: -100px;
    }
    .left-brand { position: relative; z-index: 1; }
    .left-brand a {
      text-decoration: none; display: flex;
      align-items: center; gap: 14px; margin-bottom: 48px;
    }
    .left-brand img { height: 44px; }
    .left-brand .logo-text { font-size: 1.6em; font-weight: bold; color: #fff; letter-spacing: 4px; }
    .left-brand .logo-text span { color: #b22222; }
    .left-quote { position: relative; z-index: 1; margin-top: auto; }
    .left-quote blockquote {
      font-size: 1.6em; color: #fff; font-style: italic;
      line-height: 1.4; margin-bottom: 18px;
      border-left: 3px solid #b22222; padding-left: 24px;
    }
    .left-quote cite { font-family: 'Lora', serif; font-size: 0.85em; color: rgba(255,255,255,0.45); }

    .auth-right {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px; background: #fff2f2;
    }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-card h1 { font-size: 1.8em; color: #1a0505; margin-bottom: 8px; }
    .auth-tagline {
      font-family: 'Lora', serif; font-size: 0.92em;
      color: #888; margin-bottom: 36px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-family: 'Lora', serif;
      font-size: 0.82em; color: #888;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
    }
    .form-group input {
      width: 100%; padding: 14px 18px;
      border: 1.5px solid #e0d0d0; border-radius: 12px;
      font-family: 'Lora', serif; font-size: 0.95em;
      background: #fff; color: #1a0505;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none; cursor: none;
    }
    .form-group input:focus {
      border-color: #b22222;
      box-shadow: 0 0 0 3px rgba(178,34,34,0.08);
    }
    .form-group input::placeholder { color: #aaa; }

    .error-msg {
      background: #fef2f2; color: #b22222;
      border: 1px solid #f5c6c6; border-radius: 10px;
      padding: 12px 16px; font-family: 'Lora', serif;
      font-size: 0.88em; margin-bottom: 16px;
    }
    .error-msg.hidden { display: none; }

    .success-panel {
      text-align: center; padding: 20px 0;
    }
    .success-panel.hidden { display: none; }
    .success-icon { font-size: 3em; margin-bottom: 16px; }
    .success-panel h2 { font-size: 1.5em; color: #1a0505; margin-bottom: 10px; }
    .success-panel p { font-family: 'Lora', serif; font-size: 0.9em; color: #888; margin-bottom: 28px; }

    .btn-auth {
      width: 100%; padding: 16px;
      background: #b22222; color: #fff; border: none;
      border-radius: 12px; font-family: 'Playfair Display', serif;
      font-size: 1.05em; font-weight: bold; cursor: none;
      transition: all 0.3s ease; margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .btn-auth:hover { background: #8b0000; box-shadow: 0 8px 24px rgba(178,34,34,0.3); }
    .btn-auth:disabled { opacity: 0.6; }
    .btn-loading::after {
      content: ''; position: absolute; right: 20px; top: 50%;
      transform: translateY(-50%); width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    .invalid-token {
      text-align: center; padding: 20px 0;
    }
    .invalid-token.hidden { display: none; }
    .invalid-token p { font-family: 'Lora', serif; font-size: 0.9em; color: #888; margin-bottom: 16px; }

    @media (max-width: 768px) {
      .auth-left { display: none; }
      .auth-right { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="custom-cursor" id="cursor"></div>

  <aside class="auth-left">
    <div class="left-brand">
      <a href="/">
        <img src="/flavory-logo.png" alt="Flavory">
        <span class="logo-text">FLAVORY<span>.</span></span>
      </a>
    </div>
    <div class="left-quote">
      <blockquote>"Il vino è la poesia della terra."</blockquote>
      <cite>— Mario Soldati</cite>
    </div>
  </aside>

  <main class="auth-right">
    <div class="auth-card">

      <!-- Invalid token -->
      <div class="invalid-token hidden" id="invalidPanel">
        <p>Il link di reset non è valido o è scaduto.</p>
        <a href="/login.html" class="btn-auth" style="display:block;text-align:center;text-decoration:none">
          Richiedi un nuovo link →
        </a>
      </div>

      <!-- Reset form -->
      <div id="resetPanel">
        <h1>Nuova password</h1>
        <p class="auth-tagline">Scegli una password di almeno 8 caratteri.</p>
        <form onsubmit="handleReset(event)">
          <div class="form-group">
            <label for="newPassword">Nuova password</label>
            <input type="password" id="newPassword" placeholder="Minimo 8 caratteri" required minlength="8" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Conferma password</label>
            <input type="password" id="confirmPassword" placeholder="Ripeti la password" required minlength="8" autocomplete="new-password">
          </div>
          <div class="error-msg hidden" id="resetError"></div>
          <button type="submit" class="btn-auth" id="resetBtn">Salva nuova password →</button>
        </form>
      </div>

      <!-- Success -->
      <div class="success-panel hidden" id="successPanel">
        <div class="success-icon">✅</div>
        <h2>Password aggiornata!</h2>
        <p>Accedi con la tua nuova password.</p>
        <a href="/login.html" class="btn-auth" style="display:block;text-align:center;text-decoration:none">
          Vai al login →
        </a>
      </div>

    </div>
  </main>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('resetPanel').style.display = 'none';
      document.getElementById('invalidPanel').classList.remove('hidden');
    }

    async function handleReset(e) {
      e.preventDefault();
      const btn       = document.getElementById('resetBtn');
      const errEl     = document.getElementById('resetError');
      const password  = document.getElementById('newPassword').value;
      const confirm   = document.getElementById('confirmPassword').value;

      errEl.classList.add('hidden');

      if (password !== confirm) {
        errEl.textContent = 'Le password non coincidono';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.classList.add('btn-loading');
      btn.textContent = 'Salvataggio…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('resetPanel').style.display   = 'none';
        document.getElementById('successPanel').classList.remove('hidden');
      } catch (ex) {
        errEl.textContent = ex.message || 'Errore — riprova';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        btn.textContent = 'Salva nuova password →';
        if (ex.message?.includes('scaduto') || ex.message?.includes('valido')) {
          document.getElementById('resetPanel').style.display = 'none';
          document.getElementById('invalidPanel').classList.remove('hidden');
        }
      }
    }
  </script>
</body>
</html>
